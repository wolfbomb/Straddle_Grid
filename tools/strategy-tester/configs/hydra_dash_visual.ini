; Hydra visual-mode dashboard check (not part of the numbered pass/fail
; suite — this is a one-off aid for eyeballing the Phase 8 dashboard).
; Launch: terminal64.exe /config:<full path to this file>
;
; Reuses hydra_02's proven settings/date range: this window is already
; known (from earlier validation) to cycle the EA through every state —
; IDLE, ARMED, ACTIVE (both a TP win and an SL loss), and COOLDOWN —
; multiple times over just 4 days, so you'll see every dashboard accent
; color without a long wait.
;
; Visual=1 opens the interactive tester chart instead of running headless.
; ShutdownTerminal=0 so the window stays open for you to actually watch —
; use the speed slider in the Tester panel to slow down/speed up, and the
; "Pause" button to freeze a frame if you want to inspect a specific state
; closely or take a screenshot.
[Tester]
Expert=Straddle\Straddle_Grid
ExpertParameters=hydra_02_deploy_fills.set
Symbol=XAUUSD-VIP
Period=M1
Model=4
Optimization=0
FromDate=2026.07.06
ToDate=2026.07.10
ForwardMode=0
Deposit=10000
Currency=USD
Leverage=500
Visual=1
Report=Hydra_dash_visual
ReplaceReport=1
ShutdownTerminal=0
UseLocal=1

; Inputs inline as well — belt and suspenders vs the .set preset
[TesterInputs]
AUTO_TRADING_ENABLED=true
MagicNumber=20260713
GridLevels=9
GridSpacingUSD=0.70
FirstLevelOffsetUSD=0.50
LotProgressionCSV=0.01,0.01,0.02,0.02,0.02,0.03,0.04,0.04,0.05
OCO_Mode=true
GridTTLMin=45
BasketTP_USD=15.0
BasketSL_USD=10.0
TrailActivate_USD=8.0
TrailDistance_USD=4.0
Session1=07:00-10:00
Session2=12:00-15:00
ATR_Min_USD=1.5
ATR_Max_USD=8.0
MaxSpreadPoints=35
MinMarginLevelPct=500.0
MaxDailyLossPct=3.0
WhipsawWindowSec=300
WhipsawCooldownMin=60
MaxWhipsawsPerDay=2
