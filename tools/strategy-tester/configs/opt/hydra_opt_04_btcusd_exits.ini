; Hydra optimization sweep 04 — BTCUSD basket-exit parameters, REAL TICKS
; FROM THE START (2026-07-19). Unlike Sweep 01 (docs/OPT_REPORT.md), this does
; NOT use the Model=1 OHLC shortcut — that shortcut produced a winner that
; collapsed from +$1,673 to -$5,496 under real-tick re-validation for gold.
; Model=4 here, no re-validation step needed on this window (out-of-sample
; validation instead happens on the held-out window below).
;
; Base = tools/strategy-tester/presets/hydra_15_btcusd_smoke.set (first-pass
; BTCUSD geometry: GridSpacingUSD=45, FirstLevelOffsetUSD=35, ATR band
; 40-250, MaxSpreadPoints=3000 — see that file's header for derivation).
; AUTO_TRADING_ENABLED flipped true here (tester-only; irrelevant to any
; live/demo chart) so the sweep actually generates trades.
;
; Training window: 2026.02.01-2026.06.01 (4 months). BTCUSD real tick
; history on this account only goes back to 2026.01.01, so 2026.06.01-
; 2026.07.18 (~6.5 weeks) is deliberately held out, untouched by this sweep,
; for out-of-sample validation of whatever wins here — gold's campaign never
; had a true held-out set and flagged that as a caveat; this sweep does.
;
; Grid: BasketTP_USD in {3,6,9,12,15}, BasketSL_USD in {2,4,6,8,10} = 25
; combos, exhaustive (Optimization=1). TrailActivate_USD/TrailDistance_USD
; held fixed at the first-pass preset's values to keep the grid 2D (same
; discipline OPT_REPORT.md's FOMC exit sweep used). OptimizationCriterion=0
; (max balance) matches every prior sweep in this repo for consistency.
[Tester]
Expert=Straddle\Straddle_Grid
ExpertParameters=hydra_15_btcusd_smoke.set
Symbol=BTCUSD
Period=M1
Model=4
Optimization=1
OptimizationCriterion=0
FromDate=2026.02.01
ToDate=2026.06.01
ForwardMode=0
Deposit=10000
Currency=USD
Leverage=500
Visual=0
Report=Hydra_opt_04_btcusd_exits
ReplaceReport=1
ShutdownTerminal=1
UseLocal=1

[TesterInputs]
AUTO_TRADING_ENABLED=true
MagicNumber=20260713
GridLevels=9
GridSpacingUSD=45.0
FirstLevelOffsetUSD=35.0
LotProgressionCSV=0.01,0.01,0.02,0.02,0.02,0.03,0.04,0.04,0.05
OCO_Mode=true
GridTTLMin=45
BasketTP_USD=6.0||3.0||3.0||15.0||Y
BasketSL_USD=4.0||2.0||2.0||10.0||Y
TrailActivate_USD=3.0
TrailDistance_USD=1.5
Session1=07:00-10:00
Session2=12:00-15:00
ATR_Min_USD=40.0
ATR_Max_USD=250.0
MaxSpreadPoints=3000
MinMarginLevelPct=500.0
MaxDailyLossPct=3.0
WhipsawWindowSec=300
WhipsawCooldownMin=60
MaxWhipsawsPerDay=2
DashSelfTest=false
