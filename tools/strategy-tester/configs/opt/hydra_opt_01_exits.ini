; Hydra optimization sweep 01 — basket exit parameters (P/L attack, 2026-07-17)
; NOT part of the numbered pass/fail suite — lives in configs/opt/ so
; run_tests.sh's *.ini glob doesn't pick it up. Launch directly:
;   terminal64.exe /config:<full path to this file (merged with common.local.ini)>
;
; Context: run 05 showed the strategy is mechanically sound but net negative
; at production defaults (-$1,770 / PF 0.95 over 3 months). This sweep
; searches the basket-exit space on the same window.
;
; Model=1 (1-minute OHLC) is a deliberate speed/accuracy trade-off for the
; SWEEP ONLY: ~4 ticks/bar makes 625 passes tractable; the top candidates
; must be re-validated on Model=4 real ticks before any conclusion.
; Optimization=1 = complete (all 5x5x5x5 = 625 combinations), criterion 0 =
; max balance.
