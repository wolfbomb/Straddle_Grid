; Hydra tester run 08 — dashboard synthetic self-test battery (headless)
; Launch: terminal64.exe /config:<full path to this file>
; Runs the DashSelfTest battery (synthetic header click + CHART_CHANGE
; through OnChartEvent, geometry/visibility read-backs) on hydra_02's
; state-cycling window. Expect exactly one
;   [DASH-SELFTEST] synthetic battery complete: N checks, 0 failures
; line and zero [DASH-FAIL] lines.
[Tester]
Expert=Straddle\Straddle_Grid
ExpertParameters=hydra_08_dash_selftest.set
Symbol=XAUUSD-VIP
Period=M1
Model=4
Optimization=0
FromDate=2026.07.06
ToDate=2026.07.10
ForwardMode=0
Deposit=10000
Currency=USD
Leverage=500
Visual=0
Report=Hydra_08_dash_selftest
ReplaceReport=1
ShutdownTerminal=1
UseLocal=1

; Inputs inline as well — belt and suspenders vs the .set preset
