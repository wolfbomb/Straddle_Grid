; Hydra tester run 07 — stops-level rejection at deploy (deferred Phase 7 item)
; Launch: terminal64.exe /config:<full path to this file>
;
; Purpose: exercise the deploy-time pre-flight abort path (CLAUDE.md §7:
; "if any level is invalid, abort the entire deployment — no partial grids").
; Gate 3 only validates GridSpacingUSD, so with production spacing (0.70)
; all five gates pass — but FirstLevelOffsetUSD=0.10 puts buy level 0 at
; mid+0.10 ≈ ask−0.05, inside the 20-pt stops-level distance (ask+0.20).
; Every deployment attempt must abort BEFORE any order is sent:
;   - journal shows "deployment ABORTED — buy level 0 @ ... violates min distance"
;   - zero "-> ARMED" transitions, zero orders, zero "invalid stops" errors
;   - state stays IDLE for the whole run, clean deinit.
[Tester]
Expert=SIGMA\Straddle_Grid
ExpertParameters=hydra_07_stops_rejection.set
Symbol=XAUUSD-VIP
Period=M1
Model=4
Optimization=0
FromDate=2026.07.09
ToDate=2026.07.10
ForwardMode=0
Deposit=10000
Currency=USD
Leverage=500
Visual=0
Report=Hydra_07_stops_rejection
ReplaceReport=1
ShutdownTerminal=1
UseLocal=1

; Inputs inline as well — belt and suspenders vs the .set preset.
; ⚠ TEST-ONLY FirstLevelOffsetUSD — never use 0.10 on a chart.
[TesterInputs]
AUTO_TRADING_ENABLED=true
MagicNumber=20260713
GridLevels=9
GridSpacingUSD=0.70
FirstLevelOffsetUSD=0.10
LotProgressionCSV=0.01,0.01,0.02,0.02,0.02,0.03,0.04,0.04,0.05
OCO_Mode=true
GridTTLMin=45
BasketTP_USD=15.0
BasketSL_USD=10.0
TrailActivate_USD=8.0
TrailDistance_USD=4.0
Session1=07:00-10:00
Session2=12:00-15:00
ATR_Min_USD=1.5
ATR_Max_USD=8.0
MaxSpreadPoints=35
MinMarginLevelPct=500.0
MaxDailyLossPct=3.0
WhipsawWindowSec=300
WhipsawCooldownMin=60
MaxWhipsawsPerDay=2
