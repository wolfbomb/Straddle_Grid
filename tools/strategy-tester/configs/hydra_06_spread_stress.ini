; Hydra tester run 06 — Phase 7 spread-stress test
; Launch: terminal64.exe /config:<full path to this file>
; MaxSpreadPoints=1 (below any real XAUUSD-VIP spread) forces gate 3's
; direct spread-cap check to block every deployment attempt for the whole
; window: zero orders placed, zero "invalid stops" journal errors — only
; clean "gates FAIL - gate 3 (Spread): N > max 1" lines.
;
; (2026-07-15: an earlier version of this config used the tester's own
; [Tester] Spread= override instead — that override was silently ignored
; by this MT5 build, the run traded normally with zero gate-3 failures.
; Forcing the block via MaxSpreadPoints on the EA side is reliable.)
[Tester]
Expert=Straddle\Straddle_Grid
ExpertParameters=hydra_06_spread_stress.set
Symbol=XAUUSD-VIP
Period=M1
Model=4
Optimization=0
FromDate=2026.06.01
ToDate=2026.07.10
ForwardMode=0
Deposit=10000
Currency=USD
Leverage=500
Visual=0
Report=Hydra_06_spread_stress
ReplaceReport=1
ShutdownTerminal=1
UseLocal=1

; Inputs inline as well — belt and suspenders vs the .set preset
[TesterInputs]
AUTO_TRADING_ENABLED=true
MagicNumber=20260713
GridLevels=9
GridSpacingUSD=0.70
FirstLevelOffsetUSD=0.50
LotProgressionCSV=0.01,0.01,0.02,0.02,0.02,0.03,0.04,0.04,0.05
OCO_Mode=true
GridTTLMin=45
BasketTP_USD=15.0
BasketSL_USD=10.0
TrailActivate_USD=8.0
TrailDistance_USD=4.0
Session1=07:00-10:00
Session2=12:00-15:00
ATR_Min_USD=1.5
ATR_Max_USD=8.0
MaxSpreadPoints=1
MinMarginLevelPct=500.0
MaxDailyLossPct=3.0
WhipsawWindowSec=300
WhipsawCooldownMin=60
MaxWhipsawsPerDay=2
