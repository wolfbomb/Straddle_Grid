; Hydra tester run 04 — WHIPSAW GUARD (Phase 5 gate test)
; Date default = a first-Friday (NFP-style) window. If the guard doesn't
; fire, pick any day with a huge two-sided M1 candle inside 12:00-15:00
; GMT and set FromDate/ToDate around it (see README).
; Launch: terminal64.exe /config:<full path to this file>
[Tester]
Expert=SIGMA\Straddle_Grid
ExpertParameters=hydra_04_whipsaw_guard.set
Symbol=XAUUSD-VIP
Period=M1
Model=4
Optimization=0
FromDate=2026.07.02
ToDate=2026.07.04
ForwardMode=0
Deposit=10000
Currency=USD
Leverage=500
Visual=0
Report=Hydra_04_whipsaw_guard
ReplaceReport=1
ShutdownTerminal=1
UseLocal=1

